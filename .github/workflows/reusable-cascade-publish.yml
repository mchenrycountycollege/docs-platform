name: Reusable - Publish Cascade docs

# Callers reference this as:
#   uses: mchenrycountycollege/docs-platform/.github/workflows/reusable-cascade-publish.yml@v1
#
# Example ~8-line caller workflow, for a consuming component repo
# (.github/workflows/publish-docs.yml):
#
#   name: Publish docs
#   on:
#     push:
#       branches: [main]
#       paths: ['docs/**']
#   jobs:
#     publish:
#       uses: mchenrycountycollege/docs-platform/.github/workflows/reusable-cascade-publish.yml@v1
#       with:
#         docs-dir: docs
#       secrets: inherit

on:
  workflow_call:
    inputs:
      docs-dir:
        description: Path to the docs folder, relative to the calling repo's root.
        type: string
        default: docs
    secrets:
      CASCADE_API_KEY:
        required: true
      CASCADE_BASE_URL:
        required: true
      CASCADE_SITE_NAME:
        required: true
      CASCADE_DOC_CONTENT_TYPE_ID:
        required: true
      CASCADE_NAV_CONTENT_TYPE_ID:
        required: true

concurrency:
  group: docs-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the action recovers deleted files' last content
          # via `git show <before-sha>:<path>`, which needs that commit
          # present locally, not just the pushed tip.
          fetch-depth: 0

      - name: Resolve before/after SHAs
        id: shas
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          # A branch's first-ever push (or some force-pushes) reports
          # `before` as all zeros -- there's no prior commit to diff against,
          # so fall back to the current tip's parent.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse "${AFTER}~1" 2>/dev/null || echo "$AFTER")
          fi
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"

      - uses: mchenrycountycollege/docs-platform/actions/publish@v1
        with:
          docs-dir: ${{ inputs.docs-dir }}
        env:
          BEFORE_SHA: ${{ steps.shas.outputs.before }}
          AFTER_SHA: ${{ steps.shas.outputs.after }}
          GIT_AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
          CASCADE_API_KEY: ${{ secrets.CASCADE_API_KEY }}
          CASCADE_BASE_URL: ${{ secrets.CASCADE_BASE_URL }}
          CASCADE_SITE_NAME: ${{ secrets.CASCADE_SITE_NAME }}
          CASCADE_DOC_CONTENT_TYPE_ID: ${{ secrets.CASCADE_DOC_CONTENT_TYPE_ID }}
          CASCADE_NAV_CONTENT_TYPE_ID: ${{ secrets.CASCADE_NAV_CONTENT_TYPE_ID }}
