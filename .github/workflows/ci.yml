name: CI

# Gate for every package's tests, including the BlockNote <-> canonical-HTML
# round-trip fixture corpus in apps/editor/lib/blocknote-html.test.ts, which
# editor-implementation-plan.md section 4 calls out as the acceptance gate
# for the editor's E1 sub-phase. No Cascade credentials needed: typecheck,
# test, and build are all static/local -- nothing here calls the live API.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build
