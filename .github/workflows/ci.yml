name: CI

# Gate for every package's tests, including the BlockNote <-> canonical-HTML
# round-trip fixture corpus in apps/editor/lib/blocknote-html.test.ts, which
# editor-implementation-plan.md section 4 calls out as the acceptance gate
# for the editor's E1 sub-phase. No Cascade credentials needed: typecheck,
# test, and build are all static/local -- nothing here calls the live API.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          # pnpm@11.10.0 itself needs Node >=22.13 to run (it uses the
          # node:sqlite builtin, added in 22.5 -- confirmed live: CI failed
          # with ERR_UNKNOWN_BUILTIN_MODULE on Node 20). This is pnpm's own
          # runtime requirement, separate from the app's `engines.node`
          # (>=20) in the root package.json.
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build
