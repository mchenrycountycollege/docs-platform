<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MCC Docs</title>
<style type="text/css">
/*<![CDATA[*/
/* ---------- tokens (sourced from the live site's own _refresh/style.css
   custom properties: --purple-*, --yellow-*, --green-*, --gray-*, and the
   --slab / --font-primary type stack) ----------
   Canonical copy: packages/runtime/tokens.css -- apps/editor's front-door
   shell imports that file directly; this Template can't (Cascade Templates
   aren't part of the JS build), so keep this block byte-identical to it by
   hand when either changes. ---------- */
:root {
  --bg: #f8f6fb;
  --bg-sidebar: #e4e0ef;
  --bg-raised: #ffffff;
  --border: #dbd6e9;
  --text: #241a38;
  --text-muted: #666666;
  --accent: #47348b;
  --accent-ink: #ffffff;
  --accent-soft: #e4e0ef;
  --accent-soft-border: #dbd6e9;
  --code-bg: #e4e0ef;
  --code-text: #3a2a63;
  --badge-git: #52832f;
  --badge-git-soft: #e6f0dc;
  --highlight: #f3bd50;
  --shadow: 0 12px 32px -12px rgba(40, 7, 89, 0.22);
  --focus-ring: #47348b;

  --font-display: "Hepta Slab", "Roboto Slab", "Zilla Slab", Georgia, serif;
  --font-body: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1229;
    --bg-sidebar: #201933;
    --bg-raised: #241c39;
    --border: #392c5c;
    --text: #ede9f6;
    --text-muted: #a79fc0;
    --accent: #b6a2e6;
    --accent-ink: #1a1229;
    --accent-soft: #2c2249;
    --accent-soft-border: #3d3062;
    --code-bg: #291f45;
    --code-text: #e3d9f7;
    --badge-git: #93c672;
    --badge-git-soft: #23331b;
    --highlight: #f3bd50;
    --shadow: 0 12px 32px -12px rgba(0, 0, 0, 0.55);
    --focus-ring: #b6a2e6;
  }
}
:root[data-theme="dark"] {
  --bg: #1a1229;
  --bg-sidebar: #201933;
  --bg-raised: #241c39;
  --border: #392c5c;
  --text: #ede9f6;
  --text-muted: #a79fc0;
  --accent: #b6a2e6;
  --accent-ink: #1a1229;
  --accent-soft: #2c2249;
  --accent-soft-border: #3d3062;
  --code-bg: #291f45;
  --code-text: #e3d9f7;
  --badge-git: #93c672;
  --badge-git-soft: #23331b;
  --highlight: #f3bd50;
  --shadow: 0 12px 32px -12px rgba(0, 0, 0, 0.55);
  --focus-ring: #b6a2e6;
}
:root[data-theme="light"] {
  --bg: #f8f6fb;
  --bg-sidebar: #e4e0ef;
  --bg-raised: #ffffff;
  --border: #dbd6e9;
  --text: #241a38;
  --text-muted: #666666;
  --accent: #47348b;
  --accent-ink: #ffffff;
  --accent-soft: #e4e0ef;
  --accent-soft-border: #dbd6e9;
  --code-bg: #e4e0ef;
  --code-text: #3a2a63;
  --badge-git: #52832f;
  --badge-git-soft: #e6f0dc;
  --highlight: #f3bd50;
  --shadow: 0 12px 32px -12px rgba(40, 7, 89, 0.22);
  --focus-ring: #47348b;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
}
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}
a { color: var(--accent); }
:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: 4px;
}

/* ---------- shell ---------- */
.shell {
  display: grid;
  grid-template-columns: 264px minmax(0, 1fr);
  min-height: 100vh;
}
@media (min-width: 1180px) {
  .shell { grid-template-columns: 264px minmax(0, 1fr) 240px; }
}

/* ---------- topbar ---------- */
.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-raised);
  position: sticky;
  top: 0;
  z-index: 30;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 0.4rem;
  font-family: var(--font-display);
  font-size: 1.15rem;
  color: var(--text);
  text-decoration: none;
  white-space: nowrap;
}
.brand strong { font-weight: 700; }
.brand span { color: var(--text-muted); font-family: var(--font-body); font-size: 0.85rem; }
.menu-toggle {
  display: none;
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text);
  border-radius: 8px;
  width: 2.1rem;
  height: 2.1rem;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
@media (max-width: 860px) {
  .menu-toggle { display: inline-flex; }
  .shell { grid-template-columns: 1fr; }
}
.breadcrumb {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.85rem;
  color: var(--text-muted);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.breadcrumb .crumb { color: var(--text-muted); }
.breadcrumb .current { color: var(--text); font-weight: 600; }
.search-trigger {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.4rem 0.6rem 0.4rem 0.75rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  min-width: 190px;
}
.search-trigger:hover { border-color: var(--accent-soft-border); color: var(--text); }
.search-trigger kbd {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  background: color-mix(in srgb, var(--highlight) 30%, var(--bg-raised));
  border: 1px solid color-mix(in srgb, var(--highlight) 55%, var(--bg-raised));
  border-radius: 5px;
  padding: 0.1rem 0.35rem;
  color: var(--text);
  margin-left: auto;
}
.theme-toggle {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-muted);
  border-radius: 8px;
  width: 2.1rem;
  height: 2.1rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}
.theme-toggle:hover { color: var(--text); }

/* ---------- sidebar ---------- */
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--bg-sidebar);
  padding: 1.1rem 0.85rem 2rem;
  overflow-y: auto;
  position: sticky;
  top: 53px;
  height: calc(100vh - 53px);
}
@media (max-width: 860px) {
  .sidebar {
    position: fixed;
    inset: 53px 0 0 0;
    z-index: 25;
    transform: translateX(-100%);
    transition: transform 180ms ease;
    width: 82vw;
    max-width: 320px;
    box-shadow: var(--shadow);
  }
  .shell.nav-open .sidebar { transform: translateX(0); }
}
.chapter { margin-bottom: 0.15rem; }
.chapter-toggle {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  font: inherit;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0.4rem 0.5rem;
  cursor: pointer;
  border-radius: 6px;
}
.chapter-toggle:hover { color: var(--text); background: var(--accent-soft); }
.chapter-toggle svg { transition: transform 150ms ease; flex-shrink: 0; }
.chapter.collapsed .chapter-toggle svg { transform: rotate(-90deg); }
.page-list { list-style: none; margin: 0.1rem 0 0.4rem; padding: 0; }
.chapter.collapsed .page-list { display: none; }
.page-list li { margin: 1px 0; }
.page-list a {
  display: block;
  padding: 0.38rem 0.6rem 0.38rem 1.5rem;
  border-radius: 6px;
  font-size: 0.88rem;
  color: var(--text);
  text-decoration: none;
  border-left: 2px solid transparent;
}
.page-list a:hover { background: var(--accent-soft); }
.page-list a.active {
  background: var(--accent-soft);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

/* ---------- content ---------- */
.content-col { min-width: 0; padding: 2.25rem 1.75rem 5rem; }
.content { max-width: 66ch; margin: 0 auto; }
.doc-tags { list-style: none; display: flex; gap: 0.4rem; flex-wrap: wrap; padding: 0; margin: 0.9rem 0 0; }
.doc-tags a {
  display: inline-block;
  font-size: 0.78rem;
  color: var(--accent);
  background: var(--accent-soft);
  border: 1px solid var(--accent-soft-border);
  border-radius: 999px;
  padding: 0.18rem 0.7rem;
  text-decoration: none;
}
.doc-tags a:hover { border-color: var(--accent); }
.content h1 {
  font-family: var(--font-display);
  font-size: 2.05rem;
  line-height: 1.2;
  margin: 0.1rem 0 0;
  text-wrap: balance;
}
.content h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  margin: 2.1rem 0 0.7rem;
  text-wrap: balance;
}
.content p { margin: 0.85rem 0; color: var(--text); }
.content code {
  font-family: var(--font-mono);
  font-size: 0.85em;
  background: var(--code-bg);
  color: var(--code-text);
  padding: 0.12em 0.4em;
  border-radius: 5px;
}
.content a { text-decoration-color: var(--accent-soft-border); text-underline-offset: 2px; }

/* ---------- right rail ---------- */
.rail {
  padding: 2.25rem 1.5rem 3rem;
  border-left: 1px solid var(--border);
  display: none;
}
@media (min-width: 1180px) { .rail { display: block; } }
.rail-box {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.9rem 1rem;
  margin-bottom: 1rem;
}
.rail-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin: 0 0 0.55rem;
}
.source-path {
  display: block;
  margin-top: 0.55rem;
  font-family: var(--font-mono);
  font-size: 0.74rem;
  color: var(--text-muted);
  word-break: break-all;
  line-height: 1.5;
}
.toc-list { list-style: none; margin: 0; padding: 0; }
.toc-list a {
  display: block;
  padding: 0.25rem 0;
  font-size: 0.82rem;
  color: var(--text-muted);
  text-decoration: none;
  border-left: 2px solid var(--border);
  padding-left: 0.6rem;
}
.toc-list a:hover, .toc-list a.active { color: var(--accent); border-left-color: var(--accent); }

/* ---------- search overlay ---------- */
.search-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 16, 28, 0.5);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 10vh 1rem 1rem;
  z-index: 50;
}
.search-overlay.open { display: flex; }
.search-panel {
  width: 100%;
  max-width: 560px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.search-input-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.85rem 1rem;
  border-bottom: 1px solid var(--border);
}
.search-input-row svg { color: var(--text-muted); flex-shrink: 0; }
.search-input-row input {
  flex: 1;
  border: none;
  background: none;
  font: inherit;
  font-size: 1rem;
  color: var(--text);
  outline: none;
}
.search-input-row kbd {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.1rem 0.35rem;
}
.search-results { max-height: 55vh; overflow-y: auto; padding: 0.4rem; }
.search-result {
  display: block;
  padding: 0.55rem 0.65rem;
  border-radius: 8px;
  text-decoration: none;
  color: var(--text);
  cursor: pointer;
}
.search-result.active, .search-result:hover { background: var(--accent-soft); }
.search-result .r-title { font-weight: 600; font-size: 0.92rem; }
.search-result .r-path { font-size: 0.76rem; color: var(--text-muted); margin-top: 0.1rem; }
.search-result mark { background: none; color: var(--accent); font-weight: 700; }
.search-empty { padding: 1.5rem 1rem; text-align: center; color: var(--text-muted); font-size: 0.88rem; }
/*]]>*/
</style>
</head>
<body>
<div class="shell" id="shell">
  <header class="topbar">
    <button aria-expanded="false" aria-label="Toggle navigation" class="menu-toggle" id="menuToggle" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <a class="brand" href="/docs/"><strong>MCC</strong><span>docs</span></a>
    <nav aria-label="Breadcrumb" class="breadcrumb" id="breadcrumb"></nav>
    <button class="search-trigger" id="searchTrigger" type="button">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M13 13l-3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Search docs
      <kbd id="kbdHint">Ctrl K</kbd>
    </button>
    <button aria-label="Toggle bionic reading" aria-pressed="false" class="theme-toggle" id="bionicToggle" type="button">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><text x="0" y="12" font-family="sans-serif" font-size="11" font-weight="700" fill="currentColor">B</text><text x="8" y="12" font-family="sans-serif" font-size="11" font-weight="400" fill="currentColor">r</text></svg>
    </button>
    <button aria-label="Toggle color theme" class="theme-toggle" id="themeToggle" type="button">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5v1.6M8 12.9v1.6M14.5 8h-1.6M3.1 8H1.5M12.6 3.4l-1.13 1.13M4.53 11.47L3.4 12.6M12.6 12.6l-1.13-1.13M4.53 4.53L3.4 3.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="8" r="3.1" stroke="currentColor" stroke-width="1.3"/></svg>
    </button>
  </header>
  <system-region name="DEFAULT"/>
</div>

<div class="search-overlay" id="searchOverlay">
  <div aria-label="Search documentation" aria-modal="true" class="search-panel" role="dialog">
    <div class="search-input-row">
      <svg width="16" height="16" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M13 13l-3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input aria-label="Search documentation" autocomplete="off" id="searchInput" placeholder="Search documentation&#8230;" type="text" />
      <kbd>Esc</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<script src="/docs/_system/docs-runtime.js"></script>
</body>
</html>
